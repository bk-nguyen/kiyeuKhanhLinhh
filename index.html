<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiệp Mời - NGUYỄN KHÁNH LINH</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff85a2;
            --deep-pink: #d81b60;
            --soft-pink: #fff5f7;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Poppins', sans-serif;
            background: #fdf6f0; 
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            transition: background 1s ease;
        }

        /* --- MÀN HÌNH 1: CUỐN LỊCH --- */
        #calendar-screen {
            position: fixed; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #fdf6f0; z-index: 200;
            transition: all 0.8s ease;
        }

        .calendar-box {
            background: white; padding: 30px; border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            text-align: center; border: 3px solid var(--primary-pink);
        }

        .calendar-header { color: var(--deep-pink); font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 35px); gap: 10px; }
        .calendar-day { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 8px; color: #ddd; font-weight: bold; font-size: 14px; }

        .special-day {
            background: var(--deep-pink); color: white !important;
            cursor: pointer; transform: scale(1.2);
            box-shadow: 0 0 15px rgba(216, 27, 96, 0.3);
            animation: bounce 1.2s infinite;
        }
        @keyframes bounce { 0%, 100% { transform: scale(1.2); } 50% { transform: scale(1.35); } }
        .hint-text { margin-top: 25px; color: #888; font-size: 13px; }

        /* --- MÀN HÌNH 2: THIỆP MỜI --- */
        #invite-page {
            display: none; flex-direction: column; align-items: center;
            width: 85%; max-width: 420px; z-index: 50; opacity: 0;
            transform: scale(0.7);
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .image-frame {
            width: 100%; background: white; padding: 10px;
            border-radius: 20px; box-shadow: 0 15px 45px rgba(219, 39, 119, 0.2);
            border: 4px solid #ffb6c1;
        }
        #invite-page img { width: 100%; display: block; border-radius: 12px; }

        /* --- ĐỒNG HỒ ĐẾM NGƯỢC --- */
        #countdown-wrapper {
            margin-top: 20px; display: flex; gap: 10px;
            background: white; padding: 15px 20px; border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 2px solid #ffcada;
        }
        .time-box { text-align: center; color: var(--deep-pink); }
        .time-val { font-size: 20px; font-weight: 900; display: block; }
        .time-label { font-size: 10px; text-transform: uppercase; }

        .show-invite { display: flex !important; opacity: 1 !important; transform: scale(1) !important; }
        
        .balloon-item {
            position: absolute; bottom: -150px; border-radius: 100%; object-fit: cover;
            border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            animation: flyUp 6s linear forwards; z-index: 60;
        }
        @keyframes flyUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: translateY(-125vh) rotate(360deg); opacity: 0; }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<audio id="bg-music" loop>
    <source src="https://files.catbox.moe/kemm3q.mp3" type="audio/mpeg">
</audio>

<div id="calendar-screen">
    <div class="calendar-box">
        <div class="calendar-header">Tháng 3 / 2026</div>
        <div class="calendar-grid" id="days-gen"></div>
        <p class="hint-text">Chọn ngày 15 để xem thiệp nhé ✨</p>
    </div>
</div>

<div id="invite-page">
    <div class="image-frame">
        <img src="https://i.postimg.cc/zXfhrLrQ/con-bo-cua-a.png" alt="Thiệp Mời">
    </div>
    
    <div id="countdown-wrapper">
        <div class="time-box"><span class="time-val" id="days">00</span><span class="time-label">Ngày</span></div>
        <div class="time-box"><span class="time-val" id="hours">00</span><span class="time-label">Giờ</span></div>
        <div class="time-box"><span class="time-val" id="mins">00</span><span class="time-label">Phút</span></div>
        <div class="time-box"><span class="time-val" id="secs">00</span><span class="time-label">Giây</span></div>
    </div>
</div>

<div id="balloon-container"></div>

<script>
    // 1. Tạo lịch
    const daysGen = document.getElementById('days-gen');
    for (let i = 1; i <= 31; i++) {
        const d = document.createElement('div');
        d.className = 'calendar-day' + (i === 15 ? ' special-day' : '');
        d.innerText = i;
        if (i === 15) d.onclick = showInvite;
        daysGen.appendChild(d);
    }

    // 2. Chuyển trực tiếp từ Lịch sang Thiệp
    function showInvite() {
        document.getElementById('calendar-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('calendar-screen').classList.add('hidden');
            const invitePage = document.getElementById('invite-page');
            invitePage.classList.add('show-invite');
            document.getElementById('bg-music').play().catch(()=>{});
            setInterval(createBalloon, 800);
            updateCountdown();
            setInterval(updateCountdown, 1000);
        }, 800);
    }

    // 3. Logic Đếm ngược
    function updateCountdown() {
        const target = new Date("March 15, 2026 09:30:00").getTime();
        const now = new Date().getTime();
        const diff = target - now;

        if (diff > 0) {
            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('secs').innerText = Math.floor((diff % (1000 * 60)) / 1000);
        } else {
            document.getElementById('countdown-wrapper').innerHTML = "Đã đến giờ rồi!";
        }
    }

    // 4. Bóng bay (Giữ nguyên)
    const balloonImages = [
        'https://i.postimg.cc/WdCdK23Q/klinh_selfie.jpg',
        'https://i.postimg.cc/nLVbRt7G/matnaj.jpg',
        'https://i.postimg.cc/BnhXwCdp/klinhleluoi.jpg'
    ];

    function createBalloon() {
        const container = document.getElementById('balloon-container');
        const balloon = document.createElement('img');
        balloon.src = balloonImages[Math.floor(Math.random() * balloonImages.length)];
        balloon.className = 'balloon-item';
        balloon.style.left = Math.random() * 85 + 'vw';
        let size = Math.random() * 40 + 70; 
        balloon.style.width = size + 'px'; balloon.style.height = size + 'px';
        balloon.style.animationDuration = (Math.random() * 2 + 5) + 's';
        container.appendChild(balloon);
        setTimeout(() => balloon.remove(), 6000);
    }
</script>
</body>
</html>
