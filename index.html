<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiệp Mời - NGUYỄN KHÁNH LINH</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary-pink: #ff85a2; --deep-pink: #d81b60; --soft-pink: #fff1f2; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Poppins', sans-serif; background: #fdf6f0; overflow: hidden; }

        /* --- MÀN HÌNH 1: LỊCH & ĐẾM NGƯỢC --- */
        #main-screen {
            position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: all 0.8s ease; z-index: 200;
        }

        .calendar-box {
            background: white; padding: 30px; border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08); text-align: center; border: 3px solid var(--primary-pink);
        }

        .calendar-header { color: var(--deep-pink); font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 35px); gap: 10px; }
        .calendar-day { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 8px; color: #ddd; font-weight: bold; }
        
        .special-day { background: var(--deep-pink); color: white !important; cursor: pointer; animation: bounce 1.2s infinite; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

        /* Countdown Style */
        #countdown { display: flex; gap: 15px; margin-top: 25px; justify-content: center; }
        .time-box { display: flex; flex-direction: column; align-items: center; }
        .time-val { font-size: 20px; font-weight: 900; color: var(--deep-pink); }
        .time-label { font-size: 10px; color: #888; text-transform: uppercase; }

        /* --- MÀN HÌNH 2: THIỆP MỜI --- */
        #invite-page {
            display: none; flex-direction: column; align-items: center;
            width: 85%; max-width: 420px; opacity: 0; transform: scale(0.7);
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .image-frame { width: 100%; background: white; padding: 10px; border-radius: 20px; box-shadow: 0 15px 45px rgba(219, 39, 119, 0.2); border: 4px solid #ffb6c1; }
        #invite-page img { width: 100%; display: block; border-radius: 12px; }

        .fade-out { opacity: 0 !important; transform: scale(0.9) !important; }
        .show-invite { display: flex !important; opacity: 1 !important; transform: scale(1) !important; }

        canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

<audio id="bg-music" loop><source src="https://files.catbox.moe/kemm3q.mp3" type="audio/mpeg"></audio>

<div id="main-screen">
    <div class="calendar-box">
        <div class="calendar-header">Tháng 3 / 2026</div>
        <div class="calendar-grid" id="days-gen"></div>
        <div id="countdown">
            <div class="time-box"><span class="time-val" id="days">00</span><span class="time-label">Ngày</span></div>
            <div class="time-box"><span class="time-val" id="hours">00</span><span class="time-label">Giờ</span></div>
            <div class="time-box"><span class="time-val" id="mins">00</span><span class="time-label">Phút</span></div>
        </div>
    </div>
</div>

<div id="invite-page">
    <div class="image-frame"><img src="https://i.postimg.cc/3xJxQvT6/thgcham.png" alt="Thiệp Mời"></div>
    <p style="color: #be185d; margin-top: 20px; font-weight: bold;">Hẹn gặp bạn ở đó nhé! ❤️</p>
</div>

<canvas id="fireworks"></canvas>

<script>
    // 1. Tạo lịch
    const daysGen = document.getElementById('days-gen');
    for (let i = 1; i <= 31; i++) {
        const d = document.createElement('div');
        d.className = 'calendar-day' + (i === 15 ? ' special-day' : '');
        d.innerText = i;
        if (i === 15) d.onclick = showInvite;
        daysGen.appendChild(d);
    }

    // 2. Countdown logic
    const targetDate = new Date("March 15, 2026 00:00:00").getTime();
    function updateCountdown() {
        const now = new Date().getTime();
        const diff = targetDate - now;
        document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    }
    setInterval(updateCountdown, 1000);
    updateCountdown();

    // 3. Chuyển sang thiệp
    function showInvite() {
        document.getElementById('main-screen').classList.add('fade-out');
        document.getElementById('bg-music').play().catch(() => {});
        setTimeout(() => {
            document.getElementById('main-screen').style.display = 'none';
            const invite = document.getElementById('invite-page');
            invite.classList.add('show-invite');
            startFireworks();
        }, 800);
    }

    // Canvas Fireworks (Giữ nguyên logic cũ)
    const canvas = document.getElementById("fireworks");
    const ctx = canvas.getContext("2d");
    let particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    class Particle {
        constructor(x, y, color) { this.x = x; this.y = y; this.color = color; this.velocity = { x: (Math.random() - 0.5) * 5, y: (Math.random() - 0.5) * 5 }; this.alpha = 1; }
        draw() { ctx.globalAlpha = this.alpha; ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill(); }
        update() { this.x += this.velocity.x; this.y += this.velocity.y; this.alpha -= 0.012; }
    }

    function startFireworks() {
        const colors = ['#ffb6c1', '#ff69b4', '#ffd700'];
        setInterval(() => {
            const x = Math.random() * canvas.width; const y = Math.random() * canvas.height * 0.5;
            for (let i = 0; i < 20; i++) particles.push(new Particle(x, y, colors[Math.floor(Math.random() * colors.length)]));
        }, 1500);
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => { if (p.alpha > 0) { p.update(); p.draw(); } else { particles.splice(i, 1); } });
            requestAnimationFrame(animate);
        }
        animate();
    }
</script>
</body>
</html>
