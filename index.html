<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiệp Mời - NGUYỄN KHÁNH LINH</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff85a2;
            --deep-pink: #d81b60;
            --soft-pink: #fff5f7;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Poppins', sans-serif;
            background: #fdf6f0; 
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            transition: background 1s ease;
        }

        /* --- MÀN HÌNH 1: CUỐN LỊCH --- */
        #calendar-screen {
            position: fixed; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #fdf6f0; z-index: 200;
            transition: all 0.8s ease;
        }

        .calendar-box {
            background: white; padding: 30px; border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            text-align: center; border: 3px solid var(--primary-pink);
        }

        .calendar-header { color: var(--deep-pink); font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 35px); gap: 10px; }
        .calendar-day { width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 8px; color: #ddd; font-weight: bold; font-size: 14px; }

        .special-day {
            background: var(--deep-pink); color: white !important;
            cursor: pointer; transform: scale(1.2);
            box-shadow: 0 0 15px rgba(216, 27, 96, 0.3);
            animation: bounce 1.2s infinite;
        }
        @keyframes bounce { 0%, 100% { transform: scale(1.2); } 50% { transform: scale(1.35); } }
        .hint-text { margin-top: 25px; color: #888; font-size: 13px; }

        /* --- MÀN HÌNH 2: THIỆP MỜI --- */
        #invite-page {
            display: none; flex-direction: column; align-items: center;
            width: 95%; max-width: 900px; 
            z-index: 50; opacity: 0;
            transform: scale(0.8);
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .image-frame {
            width: 100%; background: white; padding: 6px;
            border-radius: 25px; box-shadow: 0 20px 50px rgba(219, 39, 119, 0.25);
            border: 5px solid #ffb6c1;
        }
        #invite-page img { 
            width: 100%; 
            display: block; 
            border-radius: 18px; 
            object-fit: contain;
            image-rendering: auto; 
            -webkit-backface-visibility: hidden;
        }

        /* --- ĐỒNG HỒ ĐẾM NGƯỢC --- */
        #countdown-wrapper {
            margin-top: 25px; display: flex; gap: 15px;
            background: white; padding: 20px 30px; border-radius: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border: 2px solid #ffcada;
        }
        .time-box { text-align: center; color: var(--deep-pink); }
        .time-val { font-size: 24px; font-weight: 900; display: block; }
        .time-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }

        .show-invite { display: flex !important; opacity: 1 !important; transform: scale(1) !important; }
        
        .balloon-item {
            position: absolute; bottom: -150px; border-radius: 100%; object-fit: cover;
            border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            animation: flyUp 6s linear forwards; z-index: 60;
        }
        @keyframes flyUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: translateY(-125vh) rotate(360deg); opacity: 0; }
        }
        .hidden { display: none !important; }

        /* --- PHÁO HOA --- */
        canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 5; }
    </style>
</head>
<body>

<audio id="bg-music" loop>
    <source src="https://files.catbox.moe/gzrjkg.mp3" type="audio/mpeg">
</audio>

<div id="calendar-screen">
    <div class="calendar-box">
        <div class="calendar-header">Tháng 3 / 2026</div>
        <div class="calendar-grid" id="days-gen"></div>
        <p class="hint-text">Chọn ngày 15 để xem thiệp nhé ✨</p>
    </div>
</div>

<div id="invite-page">
    <div class="image-frame">
        <img src="https://i.postimg.cc/RFc6tQg3/con-bo-cua-a-CHO-WEB-(1920-x-1080-px).png" alt="Thiệp Mời">
    </div>
    
    <div id="countdown-wrapper">
        <div class="time-box"><span class="time-val" id="days">00</span><span class="time-label">Ngày</span></div>
        <div class="time-box"><span class="time-val" id="hours">00</span><span class="time-label">Giờ</span></div>
        <div class="time-box"><span class="time-val" id="mins">00</span><span class="time-label">Phút</span></div>
        <div class="time-box"><span class="time-val" id="secs">00</span><span class="time-label">Giây</span></div>
    </div>
</div>

<div id="balloon-container"></div>
<canvas id="fireworks"></canvas> <script>
    const daysGen = document.getElementById('days-gen');
    for (let i = 1; i <= 31; i++) {
        const d = document.createElement('div');
        d.className = 'calendar-day' + (i === 15 ? ' special-day' : '');
        d.innerText = i;
        if (i === 15) d.onclick = showInvite;
        daysGen.appendChild(d);
    }

    function showInvite() {
        document.getElementById('calendar-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('calendar-screen').classList.add('hidden');
            const invitePage = document.getElementById('invite-page');
            invitePage.classList.add('show-invite');
            document.getElementById('bg-music').play().catch(()=>{});
            setInterval(createBalloon, 800);
            updateCountdown();
            setInterval(updateCountdown, 1000);
            startFireworks(); // Kích hoạt pháo hoa
        }, 800);
    }

    function updateCountdown() {
        const target = new Date("March 15, 2026 09:30:00").getTime();
        const now = new Date().getTime();
        const diff = target - now;

        if (diff > 0) {
            document.getElementById('days').innerText = String(Math.floor(diff / (1000 * 60 * 60 * 24))).padStart(2, '0');
            document.getElementById('hours').innerText = String(Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
            document.getElementById('mins').innerText = String(Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
            document.getElementById('secs').innerText = String(Math.floor((diff % (1000 * 60)) / 1000)).padStart(2, '0');
        } else {
            document.getElementById('countdown-wrapper').innerHTML = "Đã đến giờ rồi!";
        }
    }

    const balloonImages = [
        'https://i.postimg.cc/WdCdK23Q/klinh_selfie.jpg',
        'https://i.postimg.cc/nLVbRt7G/matnaj.jpg',
        'https://i.postimg.cc/BnhXwCdp/klinhleluoi.jpg',
        'https://i.postimg.cc/kX5Q0zjT/z7577811140542-16d54a4ee0ed7bb3871201b79c37b3d1.jpg'
    ];

    function createBalloon() {
        const container = document.getElementById('balloon-container');
        const balloon = document.createElement('img');
        balloon.src = balloonImages[Math.floor(Math.random() * balloonImages.length)];
        balloon.className = 'balloon-item';
        balloon.style.left = Math.random() * 85 + 'vw';
        let size = Math.random() * 40 + 70; 
        balloon.style.width = size + 'px'; balloon.style.height = size + 'px';
        balloon.style.animationDuration = (Math.random() * 2 + 5) + 's';
        container.appendChild(balloon);
        setTimeout(() => balloon.remove(), 6000);
    }

    /* --- PHÁO HOA SCRIPT --- */
    const canvas = document.getElementById("fireworks");
    const ctx = canvas.getContext("2d");
    let particles = [];
    function resizeCanvas() { 
        canvas.width = window.innerWidth; 
        canvas.height = window.innerHeight; 
    }
    window.addEventListener('resize', resizeCanvas); 
    resizeCanvas(); // Gọi lần đầu để đặt kích thước

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y; this.color = color;
            this.velocity = { x: (Math.random() - 0.5) * 6, y: (Math.random() - 0.5) * 6 };
            this.alpha = 1;
            this.friction = 0.95; // Giảm tốc độ hạt
            this.gravity = 0.1; // Thêm trọng lực
        }
        draw() {
            ctx.globalAlpha = this.alpha;
            ctx.beginPath(); ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
            ctx.fillStyle = this.color; ctx.fill();
        }
        update() { 
            this.velocity.x *= this.friction;
            this.velocity.y *= this.friction;
            this.velocity.y += this.gravity; // Áp dụng trọng lực
            this.x += this.velocity.x; 
            this.y += this.velocity.y; 
            this.alpha -= 0.015; 
        }
    }

    function startFireworks() {
        const colors = ['#ffb6c1', '#ff69b4', '#ffd700', '#ffffff', '#ff1493']; // Thêm màu hồng đậm hơn
        setInterval(() => {
            const x = Math.random() * canvas.width;
            // Giới hạn pháo hoa ở nửa trên màn hình
            const y = Math.random() * canvas.height * 0.6; 
            const color = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < 40; i++) particles.push(new Particle(x, y, color)); // Tăng số hạt
        }, 1000); // Tần suất bắn pháo hoa nhanh hơn
        
        function animateFireworks() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Xóa toàn bộ canvas để vẽ lại
            particles.forEach((p, i) => {
                if (p.alpha > 0) { 
                    p.update(); 
                    p.draw(); 
                } else { 
                    particles.splice(i, 1); 
                }
            });
            requestAnimationFrame(animateFireworks);
        }
        animateFireworks();
    }
</script>
</body>
</html>
